        this._stream.writeByte(this._buffer[this._streamPos ++]);

      if (this._pos >= this._windowSize){
        this._pos = 0;
      }
      this._streamPos = this._pos;
    }
  };

  LZMA.OutWindow.prototype.releaseStream = function(){
    this.flush();

      }
      this._buffer[this._pos ++] = this._buffer[pos ++];
      if (this._pos >= this._windowSize){
        this.flush();
      }
    }
  };

    this._buffer[this._pos ++] = b;
    if (this._pos >= this._windowSize){

    }
  };

    var pos = this._pos - distance - 1;

    }

      this._code -= this._range & (t - 1);

        this._range <<= 8;

      probs[index] += (2048 - prob) >>> 5;
      if ( (this._range & 0xff000000) === 0){

        this._range <<= 8;

    this._range -= newBound;
    this._code -= newBound;
    probs[index] -= prob >>> 5;
    if ( (this._range & 0xff000000) === 0){
      this._code = (this._code << 8) | this._stream.readByte();
      this._range <<= 8;

    dictionarySize |= properties.readByte() << 8;
    dictionarySize |= properties.readByte() << 16;
    dictionarySize += properties.readByte() * 16777216;

        break;
      case CTM.CompressionMethod.MG1:
        reader = new CTM.ReaderMG1();
        break;
      case CTM.CompressionMethod.MG2:
        reader = new CTM.ReaderMG2();
        break;
    }

    return reader;
  };

  CTM.FileHeader = function(stream){
    stream.readInt32(); //magic "OCTM"
    this.fileFormat = stream.readInt32();
    this.compressionMethod = stream.readInt32();
    this.vertexCount = stream.readInt32();
    this.triangleCount = stream.readInt32();
    this.uvMapCount = stream.readInt32();
    this.attrMapCount = stream.readInt32();
    this.flags = stream.readInt32();
    this.comment = stream.readString();
  };

  CTM.FileHeader.prototype.hasNormals = function(){
    return this.flags & CTM.Flags.NORMALS;
  };

  CTM.FileBody = function(header){
    var i = header.triangleCount * 3,
        v = header.vertexCount * 3,
        n = header.hasNormals()? header.vertexCount * 3: 0,
        u = header.vertexCount * 2,
        a = header.vertexCount * 4,
        j = 0;

    var data = new ArrayBuffer(
      (i + v + n + (u * header.uvMapCount) + (a * header.attrMapCount) ) * 4);

    this.indices = new Uint32Array(data, 0, i);

    this.vertices = new Float32Array(data, i * 4, v);

    if ( header.hasNormals() ){
      this.normals = new Float32Array(data, (i + v) * 4, n);
    }

    if (header.uvMapCount){
      this.uvMaps = [];
      for (j = 0; j < header.uvMapCount; ++ j){
        this.uvMaps[j] = {uv: new Float32Array(data,
          (i + v + n + (j * u) ) * 4, u) };
      }
    }

    if (header.attrMapCount){
      this.attrMaps = [];
      for (j = 0; j < header.attrMapCount; ++ j){

          (i + v + n + (u * header.uvMapCount) + (j * a) ) * 4, a) };
      }

  CTM.restoreIndices = function(indices, len){
    var i = 3;

      indices[2] += indices[0];

      indices[i] += indices[i - 3];

      if (indices[i] === indices[i - 3]){
        indices[i + 1] += indices[i - 2];
      }else{
        indices[i + 1] += indices[i];
      }

    for (; i < len; j += 3){
      x = gridIdx = gridIndices[i ++];

      x -= ~~(z * zdiv);
      y = ~~(x / ydiv);
      x -= ~~(y * ydiv);

      indy = indices[i ++] * 3;
      indz = indices[i ++] * 3;

      v2x = vertices[indz]     - vertices[indx];

      v2y = vertices[indz + 1] - vertices[indx + 1];

      ny = v1z * v2x - v1x * v2z;

        ny /= len;

      smooth[indx + 1] += ny;
      smooth[indx + 2] += nz;
      smooth[indy]     += nx;
      smooth[indy + 1] += ny;
      smooth[indy + 2] += nz;
      smooth[indz]     += nx;
      smooth[indz + 1] += ny;
      smooth[indz + 2] += nz;

    display: none !important;
  }

  body.view-fsaverage #colorlegend-colorbar {
    pointer-events: none;
    cursor: default;
  }

  .abstract-tooltip {
    position: fixed;
    z-index: 310;
    max-width: min(560px, 92vw);
    padding: 0.7rem 0.82rem;
    border-radius: 0.78rem;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: rgba(19, 19, 20, 0.97);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.42);
    pointer-events: none;
  }

  .abstract-tooltip.hidden {
    display: none;
  }

  .abstract-tooltip .abstract-title {
    font-size: 0.77rem;
    color: #d6d8dd;
    margin-bottom: 0.35rem;
    line-height: 1.35;
  }

  .abstract-tooltip .abstract-text {
    font-size: 0.83rem;
    color: #f1f1f1;
    line-height: 1.42;
    white-space: pre-wrap;
  }

  #loader .loader-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(90px - 50%));
    color: #d5e7ff;
    font-size: 1.08rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: "IBM Plex Mono", monospace;
  }

  @media (max-width: 1240px) {
    :root {
      --rhs-width: min(44vw, 560px);
    }
    #rhs {
      width: var(--rhs-width);
    }
  }

  @media (max-width: 980px) {
    :root {
      --mobile-plot-height: min(52dvh, 420px);
      --site-gutter: 0px;
      --site-inset: 0px;
      --brain-width: 100vw;
      --layout-total-width: 100vw;
      --layout-left: 0px;
      --controls-left: 0.72rem;
    }

    body::before {
      display: none;
    }

    .plot-host {
      left: 0;
      right: 0 !important;
      top: var(--safe-top);
      bottom: auto;
      width: unset !important;
      max-width: unset !important;
      height: var(--mobile-plot-height);
      border-bottom: 1px solid var(--panel-border);
    }

    #rhs {
      left: 0;
      width: 100vw;
      top: calc(var(--safe-top) + var(--mobile-plot-height));
      bottom: 0;
      height: calc(var(--viewport-height) - var(--safe-top) - var(--mobile-plot-height));
      right: 0;
      border-left: none;
      border-top: 1px solid var(--panel-border);
      padding-bottom: var(--safe-bottom);
    }

    #splitter {
      display: none !important;
    }

    .panel-header {
      padding: 0.72rem 0.92rem 0.3rem;
    }

    .panel-header .subtitle {
      display: none;
    }

    #response_box {
      padding: 0.5rem 0.82rem 0.25rem;
    }

    #query_status {
      margin-bottom: 0.5rem;
    }

    #query_box {
      position: sticky;
      bottom: 0;
      z-index: 240;
      padding: 0.64rem 0.82rem 0.82rem;
    }

    .toggle-container {
      top: calc(var(--safe-top) + 0.55rem);
      left: 0.72rem;
      width: 200px;
    }

    #alphaSlider {
      top: calc(var(--safe-top) + 2.85rem);
      left: 0.72rem;
      width: 200px;
    }

    .abstract-tooltip {
      max-width: 94vw;
    }
  }

  @media (max-width: 560px) {
    :root {
      --mobile-plot-height: min(50dvh, 360px);
    }

    .panel-header h1 {
      font-size: 1.22rem;
    }

    .toggle-container {
      width: 176px;
    }

    #alphaSlider {
      width: 176px;
    }

  }
</style>
</head>

<body>
  <div id="loader" class="loader-wrapper">
    <figure>
      <div class="dot white">
      </div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </figure>
    <div class="loader-label">Loading NeuroVLM</div>
  </div>
  <div id="rhs">
      <div class="panel-header">
          <p class="eyebrow">Interactive Neuroimaging Explorer</p>
          <h1>NeuroVLM</h1>
          <!-- <p class="subtitle">Enter a concept and inspect predicted cortical activity plus ranked supporting publications.</p> -->
      </div>
      <div id="response_box">
        <div id="query_status">Ready.</div>
        <div id="output_container"></div>
      </div>
      <div id="query_box">
          <div class="input-container">
              <textarea class="text-input" id="txid" rows="1" placeholder="Query neuroimaging papers"></textarea>
              <button id="query_submit" type="button">Run Query</button>
          </div>
      </div>
  </div>
  <input
    type="range"
    min="1"
    max="255"
    value="255"
    class="slider"
    id="alphaSlider"
  />
  <select id="sliceType" style="display: none;">
    <option value="0">Axial</option>
    <option value="1">Coronal</option>
    <option value="2">Sagittal</option>
    <option value="4">Render</option>
    <option value="3" selected>A+C+S+R</option>
  </select>
  <div id="abstract_tooltip" class="abstract-tooltip hidden" role="tooltip" aria-hidden="true"></div>
</body>
<footer id="intensity" style="display: none;">&nbsp;</footer>
